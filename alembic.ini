; ===========================================================================
; Alembic configuration for Tokio Bar Bot
; ===========================================================================
; The database URL is intentionally NOT set here — it is resolved at runtime
; in ``alembic/env.py`` from the application settings (config/settings.py),
; so the same .env file used by the bot is used for migrations.
;
; Usage:
;   alembic upgrade head      # apply all migrations
;   alembic downgrade -1      # roll back the last migration
;   alembic revision --autogenerate -m "description"  # create a new migration
; ===========================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

; timezone/encoding niceties
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S